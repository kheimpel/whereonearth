projection: web_mercator
lat_bounds: [-72, 84]
tile_height: 400   # pixels, @2x (200pt map strip height)
tile_width: 400    # pixels, @2x (200pt per tile)
strip_padding_deg: 20
pixels_per_degree: 22  # controls strip width: 22 * 400° = 8800px total ≈ 20 tiles

styles:
  bg: "#0C1425"
  coastline: "#D4A843"
  coastline_width: 1.5
  land_fill: "#14213D"
  border: "#2A3A5C"
  river: "#1A3055"
  graticule_color: "#D4A843"
  graticule_alpha: 0.08

levels:
  L1:
    layers:
      - land
      - coastline
    source_scale: "110m"
